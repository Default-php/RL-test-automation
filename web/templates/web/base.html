<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}RL Test Prioritizer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --ink: #1f2933;
        --muted: #62717f;
        --line: #d8e0e8;
        --panel: #ffffff;
        --page: #f4f7fa;
        --accent: #0f766e;
        --accent-dark: #115e59;
      }

      body {
        background: var(--page);
        color: var(--ink);
      }

      .app-shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .topbar {
        background: var(--panel);
        border-bottom: 1px solid var(--line);
      }

      .surface {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
      }

      .metric-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 96px;
        padding: 16px;
      }

      .metric-label {
        color: var(--muted);
        font-size: 0.84rem;
        margin-bottom: 6px;
      }

      .metric-value {
        font-size: 1.45rem;
        font-weight: 700;
      }

      .btn-primary {
        background: var(--accent);
        border-color: var(--accent);
      }

      .btn-primary:hover,
      .btn-primary:focus {
        background: var(--accent-dark);
        border-color: var(--accent-dark);
      }

      .table {
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <div class="app-shell py-3 d-flex align-items-center justify-content-between">
        <a class="navbar-brand fw-semibold text-decoration-none text-dark" href="{% url 'web:home' %}">RL Test Prioritizer</a>
        <span class="text-secondary small">Automated test prioritization</span>
      </div>
    </nav>

    <main class="app-shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
